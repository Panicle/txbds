app = "smart-shoe-server"
primary_region = "hkg"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[processes]
  app = "python main.py"

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  PORT = "8080"
  PYTHONPATH = "/app"